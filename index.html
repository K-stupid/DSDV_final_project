<!DOCTYPE html>

<head>
<title>Video Game Sales Visualization</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Video Game Sales Visualization</h1>

<h2>Sales by Genre</h2>
<div id="genreChart"></div>

<h2>Sales by Platform</h2>
<div id="platformChart"></div>

<h2>Sales Over Time</h2>
<div id="lineChart"></div>

<h2>Genre Distribution (Pie Chart)</h2>

<div class="controls">
    <button id="addData">Add Data</button>
    <button id="removeData">Remove Data</button>
</div>

<div id="pieChart"></div>
<script src="script.js"></script>

</body>

</html>
